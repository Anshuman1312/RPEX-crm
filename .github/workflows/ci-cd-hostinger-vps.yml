name: CI/CD Hostinger VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci-backend:
    name: CI Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate backend imports
        run: python -m compileall app

  ci-frontend:
    name: CI Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Hostinger VPS
    runs-on: ubuntu-latest
    needs: [ci-backend, ci-frontend]
    if: github.event_name == 'push'
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
    steps:
      - name: Validate deploy secrets
        run: |
          test -n "$VPS_HOST" || (echo "Missing secret: VPS_HOST"; exit 1)
          test -n "$VPS_USER" || (echo "Missing secret: VPS_USER"; exit 1)
          test -n "$VPS_PASSWORD" || (echo "Missing secret: VPS_PASSWORD"; exit 1)
          test -n "$VPS_APP_DIR" || (echo "Missing secret: VPS_APP_DIR"; exit 1)

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          password: ${{ env.VPS_PASSWORD }}
          port: 22
          script_stop: true
          command_timeout: 30m
          script: |
            export APP_DIR="${{ env.VPS_APP_DIR }}"
            export BRANCH="${{ github.ref_name }}"
            export COMPOSE_FILE="docker-compose.yml"
            if [ ! -d "$APP_DIR" ]; then
              echo "APP_DIR does not exist on VPS: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"

            if [ ! -d .git ]; then
              echo "APP_DIR is not a git repository: $APP_DIR"
              exit 1
            fi

            git fetch --all --prune
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"

            docker compose -f "$COMPOSE_FILE" up -d --build --force-recreate --remove-orphans
