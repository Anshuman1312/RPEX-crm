services:
  postgres:
    image: postgres:16
    container_name: rpex_postgres
    environment:
      POSTGRES_DB: rpex_crm
      POSTGRES_USER: rpex
      POSTGRES_PASSWORD: rpex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rpex -d rpex_crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: rpex_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: rpex_backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  celery_worker:
    build:
      context: ./backend
    container_name: rpex_celery_worker
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["celery", "-A", "app.workers.celery_app.celery", "worker", "--loglevel=INFO"]

  celery_beat:
    build:
      context: ./backend
    container_name: rpex_celery_beat
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: ["celery", "-A", "app.workers.celery_app.celery", "beat", "--loglevel=INFO"]

  frontend:
    build:
      context: ./frontend
    container_name: rpex_frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - /frontend/node_modules

  nginx:
    image: nginx:1.27-alpine
    container_name: rpex_nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/letsencrypt:/etc/letsencrypt
      - ./infra/nginx/certbot:/var/www/certbot

  certbot:
    image: certbot/certbot:latest
    container_name: rpex_certbot
    depends_on:
      - nginx
    volumes:
      - ./infra/nginx/letsencrypt:/etc/letsencrypt
      - ./infra/nginx/certbot:/var/www/certbot
    entrypoint: >-
      sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $$!;
      done"

volumes:
  postgres_data:
